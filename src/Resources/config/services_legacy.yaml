services:
    # Sulu 2.x only: Configurable Text Editor content type (PHPCR-based)
    # This service is loaded conditionally when Sulu\Component\Content\Types\TextEditor exists
    Akawaka\SuluMultiCKEditorBundle\Content\Type\MultiTextEditorType:
        arguments:
            - '@sulu_markup.parser'
            - 'sulu'
        tags:
            - { name: sulu.content.type, alias: configurable_text_editor }
